<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠️ SHIXTER - SYSTEM OVERRIDE ☠️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050505;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        /* تساقط قطرات الدم والجماجم والعناكب */
        .horror-particle {
            font-size: 1.4em;
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            pointer-events: none;
            animation-name: fall, shake;
            animation-duration: 8s, 2.5s;
            animation-timing-function: linear, ease-in-out;
            animation-iteration-count: infinite, infinite;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.8));
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 100%; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(15px); }
        }

        /* توهج أحمر شيطاني */
        .neon-glow-red {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            border: 1px solid rgba(255, 0, 0, 0.5);
        }
        
        /* تأثير اهتزاز النص (Glitch) */
        .glitch-text {
            text-shadow: 2px 2px 0px #ff0000, -2px -2px 0px #550000;
            animation: glitch 1.5s infinite;
        }
        @keyframes glitch {
            0%, 100% { text-shadow: 2px 2px 0px #ff0000, -2px -2px 0px #500000; }
            50% { text-shadow: -2px 2px 0px #ff0000, 2px -2px 0px #500000; }
        }

        .error-message {
            color: #ff4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .success-message {
            color: #44ff44;
            font-size: 0.85rem;
            padding: 0.75rem;
            background-color: #0a2a0a;
            border: 1px solid #44ff44;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- الجزيئات المتساقطة المرعبة -->
    <div class="horror-particle" style="left: 8%; animation-delay: 0s, 0s;">🩸</div>
    <div class="horror-particle" style="left: 23%; animation-delay: 2.5s, 1s;">💀</div>
    <div class="horror-particle" style="left: 44%; animation-delay: 1.2s, 1.8s;">🕷️</div>
    <div class="horror-particle" style="left: 62%; animation-delay: 4.5s, 0.5s;">☠️</div>
    <div class="horror-particle" style="left: 81%; animation-delay: 3s, 1.2s;">🩸</div>
    <div class="horror-particle" style="left: 93%; animation-delay: 1.8s, 2s;">💀</div>

    <!-- الكرت الرئيسي -->
    <div class="w-full max-w-md bg-[#0b0b0b] border-2 border-red-950 rounded-[2.5rem] p-6 shadow-[0_0_35px_rgba(255,0,0,0.25)] relative overflow-hidden">
        
        <!-- الهيدر -->
        <div class="flex justify-between items-center mb-6">
            <div class="text-right">
                <h1 class="text-3xl font-black text-red-600 tracking-widest glitch-text">شيكستر</h1>
                <h2 class="text-xs font-bold text-gray-500 tracking-wider">☠️ OVERRIDE PRO ☠️</h2>
            </div>
            <div class="flex items-center gap-1.5 bg-[#170404] border border-red-900/60 px-3 py-1.5 rounded-full text-xs font-semibold text-red-500">
                ☣️ <span>DANGER +18</span>
            </div>
        </div>

        <!-- المدخلات -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-red-500/80 mb-1.5 uppercase tracking-widest">🩸 بريد الدعم</label>
                <input type="email" id="email" placeholder="أدخل البريد الإلكتروني" 
                       class="w-full bg-[#111111] border border-red-950/60 rounded-2xl px-4 py-3 text-red-500 focus:outline-none focus:border-red-600 text-left font-mono" dir="ltr">
                <div id="emailError" class="error-message"></div>
            </div>

            <div>
                <label class="block text-xs font-bold text-red-500/80 mb-1.5 uppercase tracking-widest">☠️ الموضوع</label>
                <input type="text" id="subject" placeholder="أدخل موضوع البلاغ" 
                       class="w-full bg-[#111111] border border-red-950/60 rounded-2xl px-4 py-3 text-red-500 focus:outline-none focus:border-red-600 text-left" dir="ltr">
                <div id="subjectError" class="error-message"></div>
            </div>

            <div>
                <label class="block text-xs font-bold text-red-500/80 mb-1.5 uppercase tracking-widest">⛓️ نص البلاغ المراد تصديره</label>
                <textarea id="report_text" rows="5" placeholder="أدخل نص البلاغ التفصيلي..."
                          class="w-full bg-[#111111] border border-red-950/60 rounded-2xl px-4 py-3 text-red-500 focus:outline-none focus:border-red-600 text-left font-mono text-xs leading-relaxed" dir="ltr"></textarea>
                <div id="textError" class="error-message"></div>
            </div>
        </div>

        <!-- رسالة النجاح -->
        <div id="successMessage" class="success-message">
            ✅ تم إرسال البلاغ بنجاح! شكراً لمساهمتك في الأمان.
        </div>

        <!-- الأزرار الرئيسية -->
        <div class="mt-6 space-y-3">
            <button onclick="sendReport()" 
                    class="w-full bg-gradient-to-r from-red-700 to-red-600 hover:from-red-600 hover:to-red-500 text-black font-extrabold py-4 rounded-2xl shadow-[0_0_20px_rgba(220,38,38,0.5)] transition transform active:scale-95 disabled:opacity-50" id="sendBtn">
                ☠️ <span>إرسال البلاغ</span> ☠️
            </button>

            <button onclick="showAddOns()" class="w-full bg-gradient-to-r from-[#170404] to-[#250808] border border-red-900 text-red-500 font-bold py-3.5 rounded-2xl transition transform active:scale-95 hover:border-red-700">
                ⚡ <span>قائمة الإضافات السرية</span> ⚡
            </button>
        </div>

        <!-- أزرار التحكم والعداد السفلي -->
        <div class="mt-6 pt-5 border-t border-red-950/60">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="useLastText()" class="bg-[#111111] border border-red-950/60 text-red-500/80 font-bold py-2.5 px-4 rounded-xl text-xs transform active:scale-95 transition hover:border-red-700">
                    🔄 آخر نص مدمر
                </button>
                <button onclick="resetCounter()" class="bg-[#111111] border border-red-950/60 text-red-500/80 font-bold py-2.5 px-4 rounded-xl text-xs transform active:scale-95 transition hover:border-red-700">
                    ⚠️ تصفير العداد
                </button>
            </div>

            <div class="flex justify-between items-center bg-[#050505] border border-red-950 rounded-2xl p-3">
                <span class="text-gray-500 text-sm font-semibold">💀 إجمالي البلاغات المرسلة</span>
                <span id="counter" class="bg-red-700 text-black font-black px-4 py-1.5 rounded-full text-base min-w-[60px] text-center shadow-[0_0_15px_rgba(255,0,0,0.7)] tracking-widest">0</span>
            </div>
        </div>

        <!-- الفوتر -->
        <div class="mt-6 flex justify-between items-center text-xs border-t border-red-950/40 pt-4">
            <span class="text-gray-600 font-bold">☠️ SHIXTER SYSTEM ☠️</span>
            <span class="text-gray-500">v2.0 - محدث</span>
        </div>

    </div>

    <script>
        // دالة الاهتزاز لهواتف الأندرويد
        function vibrateDevice(ms) {
            if (navigator.vibrate) {
                navigator.vibrate(ms);
            }
        }

        // دالة التحقق من صحة البريد الإلكتروني
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // دالة التحقق من صحة النصوص (منع XSS)
        function sanitizeText(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // قراءة العداد والنص من localStorage
        let counter = localStorage.getItem('shixter_counter') ? parseInt(localStorage.getItem('shixter_counter')) : 0;
        let lastText = localStorage.getItem('shixter_last_text') || "";

        document.getElementById('counter').innerText = counter;

        function sendReport() {
            vibrateDevice(80);
            
            // مسح الأخطاء السابقة
            document.getElementById('emailError').innerText = '';
            document.getElementById('subjectError').innerText = '';
            document.getElementById('textError').innerText = '';

            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const text = document.getElementById('report_text').value.trim();

            let hasError = false;

            // التحقق من البريد الإلكتروني
            if (!email) {
                document.getElementById('emailError').innerText = '⚠️ البريد الإلكتروني مطلوب';
                hasError = true;
            } else if (!isValidEmail(email)) {
                document.getElementById('emailError').innerText = '⚠️ البريد الإلكتروني غير صحيح';
                hasError = true;
            }

            // التحقق من الموضوع
            if (!subject) {
                document.getElementById('subjectError').innerText = '⚠️ الموضوع مطلوب';
                hasError = true;
            } else if (subject.length < 5) {
                document.getElementById('subjectError').innerText = '⚠️ الموضوع يجب أن يكون 5 أحرف على الأقل';
                hasError = true;
            }

            // التحقق من نص البلاغ
            if (!text) {
                document.getElementById('textError').innerText = '⚠️ نص البلاغ مطلوب';
                hasError = true;
            } else if (text.length < 10) {
                document.getElementById('textError').innerText = '⚠️ نص البلاغ يجب أن يكون 10 أحرف على الأقل';
                hasError = true;
            }

            if (hasError) {
                vibrateDevice(150);
                return;
            }

            // حفظ النص وتحديث العداد
            counter++;
            document.getElementById('counter').innerText = counter;
            localStorage.setItem('shixter_counter', counter);
            localStorage.setItem('shixter_last_text', text);
            lastText = text;

            // فتح الجيميل مع البيانات المنظفة
            const mailtoUrl = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;
            window.location.href = mailtoUrl;

            // إظهار رسالة النجاح
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 4000);
        }

        function resetCounter() {
            vibrateDevice(150);
            if (confirm('هل تريد فعلاً تصفير العداد؟')) {
                counter = 0;
                document.getElementById('counter').innerText = counter;
                localStorage.setItem('shixter_counter', counter);
            }
        }

        function useLastText() {
            vibrateDevice(45);
            if(lastText) {
                document.getElementById('report_text').value = lastText;
            } else {
                alert("لا يوجد نص محفوظ مسبقاً!");
            }
        }

        function showAddOns() {
            vibrateDevice(100);
            alert("🔧 الإضافات:\n\n✅ حماية من الأخطاء\n✅ التحقق من البيانات\n✅ حفظ آخر بلاغ\n✅ عداد البلاغات\n\nالإصدار: v2.0");
        }
    </script>
</body>
</html>
